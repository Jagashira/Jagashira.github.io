name: Update GitHub Contributions

on:
  schedule:
    # Every Monday at 00:00 JST (Sunday 15:00 UTC)
    - cron: "0 15 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-contributions:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate contribution SVG
        env:
          GITHUB_CONTRIBUTIONS_USER: Jagashira
          GH_CONTRIBUTIONS_TOKEN: ${{ secrets.GH_CONTRIBUTIONS_TOKEN }}
        run: node scripts/generate-github-contributions.mjs

      - name: Commit updated SVG
        run: |
          if git diff --quiet -- public/github/contributions.svg; then
            echo "No contribution updates to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/github/contributions.svg
          git commit -m "Update GitHub contributions graph"
          git push
